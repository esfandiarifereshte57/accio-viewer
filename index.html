<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آکسیو · جام جهانی ۲۰۲۶</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #070b14;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070b14;
            color: #7ec8ff;
            font-family: 'Vazir', -apple-system, sans-serif;
            font-size: 1.1rem;
            z-index: 10;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .loading.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <span>در حال بارگذاری آکسیو ...</span>
    </div>
    <iframe src="https://accioprivateprojecysite.vercel.app/" title="Accio World Cup 2026" allow="clipboard-write" loading="lazy"></iframe>
    <script>
        window.addEventListener('load', function() {
            var loading = document.getElementById('loading');
            loading.classList.add('hidden');
            setTimeout(function() {
                loading.style.display = 'none';
            }, 700);
        });
    </script>
</body>
</html>
